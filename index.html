<script type="text/babel" data-presets="react">

const { useState, useRef, useEffect } = React;

// --- icônes inline (SVG simples, pas de lib externe) ---
const Ico = ({d, size=16, sw=2}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>

  </svg>
);
const Upload = (p)=> <Ico {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>}/>;
const Shuffle=(p)=> <Ico {...p} d={<><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></>}/>;

const Flame=(p)=> <Ico {...p} d={<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>}/>;
const Trophy=(p)=> <Ico {...p} d={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>}/>;
const Library=(p)=> <Ico {...p} d={<><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></>}/>;
const Sparkles=(p)=> <Ico {...p} d={<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>}/>;
const Pause=(p)=> <Ico {...p} d={<><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></>}/>;
const Coins=(p)=> <Ico {...p} d={<><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></>}/>;
const Play=(p)=> <Ico {...p} d={<polygon points="6 3 20 12 6 21 6 3"/>}/>;
const Monitor=(p)=> <Ico {...p} d={<><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>}/>;
const Gamepad2=(p)=> <Ico {...p} d={<><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.544-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></>}/>;
const Download=(p)=> <Ico {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>;

const STATUS = { UNSORTED:"unsorted", SHORTLIST:"shortlist", MUSTFINISH:"mustfinish", SOMEDAY:"someday", NEVER:"never", PLAYING:"playing", DONE:"done", DROPPED:"dropped" };
const PLATFORM = { PC:"pc", DECK:"deck", BOTH:"both" };
const MAX_SLOTS = 3;
const SAVE_KEY = "backlogBusterState_v1";

const fmtHours = (min) => { const h = Math.floor(min/60); return h>0 ? h+"h" : min+"m"; };
const achLabel = (g) => (g.achTotal>0 ? g.achUnlocked+"/"+g.achTotal+" \u00b7 "+Math.round(g.achPct)+"%" : null);
const achColor = (g) => { if(g.achTotal===0) return "#6e7681"; if(g.achPct>=100) return "#7ee787"; if(g.achPct>=50) return "#ffa657"; return "#8b949e"; };
const canRunOn = (g, plat) => g.platform===plat || g.platform===PLATFORM.BOTH;

const mkGame = (g) => ({
  id:String(g.id), name:g.name??"Sans titre", minutes:Math.round(g.minutes??0),
  status:STATUS.UNSORTED, platform:null, runningOn:null,
  achUnlocked:g.achUnlocked??0, achTotal:g.achTotal??0, achPct:g.achPct??null,
});

function loadInitial(){
  try { const saved = localStorage.getItem(SAVE_KEY); if(saved){ const arr=JSON.parse(saved); if(Array.isArray(arr)&&arr.length) return arr; } } catch(e){}
  return STEAM_LIBRARY.map(mkGame);
}

// Extrait jeux + succès depuis le HTML de la page Steam (format React actuel)
function parseSteamHTML(text){
  let t=text;
  for(let i=0;i<6;i++){ const n=t.split("\\\\").join("\\").split('\\"').join('"'); if(n===t)break; t=n; }
  // jeux : objets contenant playtime_forever
  const games={};
  const gre=/\{[^{}]*?"playtime_forever"[^{}]*?\}/g; let m;
  while((m=gre.exec(t))){
    const c=m[0];
    const a=c.match(/"appid"\s*:\s*(\d+)/); const p=c.match(/"playtime_forever"\s*:\s*(\d+)/);
    const n=c.match(/"name"\s*:\s*"((?:[^"\\]|\\.)*)"/);
    if(a&&p){ let name=n?n[1]:a[1]; try{name=JSON.parse('"'+name+'"');}catch(e){} games[a[1]]={id:a[1],name:name,minutes:parseInt(p[1],10)}; }
  }
  // succès : objets appid+unlocked+total+percentage
  const are=/\{"appid":\d+,"unlocked":\d+,"total":\d+,"percentage":\d+[^{}]*\}/g;
  while((m=are.exec(t))){
    try{ const o=JSON.parse(m[0]); const g=games[String(o.appid)];
      if(g){ if(o.total>0){g.achUnlocked=o.unlocked;g.achTotal=o.total;g.achPct=o.percentage;} else {g.achUnlocked=0;g.achTotal=0;g.achPct=null;} } }catch(e){}
  }
  const arr=Object.values(games);
  return arr.length?arr:null;
}

function App(){
  const [games,setGames] = useState(loadInitial);
  const [view,setView] = useState("board");
  const [pick,setPick] = useState(null);
  const [pickFilter,setPickFilter] = useState(PLATFORM.BOTH);
  const [search,setSearch] = useState("");
  const [sortBy,setSortBy] = useState("name");
  const [platformPrompt,setPlatformPrompt] = useState(null);

  // persistance auto
  useEffect(()=>{ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(games)); }catch(e){} }, [games]);

  // si rien n'est encore trié, démarre sur le tri
  useEffect(()=>{ if(games.some(g=>g.status===STATUS.UNSORTED) && games.every(g=>g.status===STATUS.UNSORTED)) setView("triage"); }, []);

  const by=(s)=>games.filter(g=>g.status===s);
  const unsorted=by(STATUS.UNSORTED), shortlist=by(STATUS.SHORTLIST), playing=by(STATUS.PLAYING);
  const mustfinish=by(STATUS.MUSTFINISH);
  const done=by(STATUS.DONE), dropped=by(STATUS.DROPPED), someday=by(STATUS.SOMEDAY);
  const untouched=games.filter(g=>g.minutes<30);
  const perfected=games.filter(g=>g.achTotal>0 && g.achPct>=100);
  const playingPC=playing.filter(g=>g.runningOn===PLATFORM.PC);
  const playingDeck=playing.filter(g=>g.runningOn===PLATFORM.DECK);

  // recherche + tri appliqués à l'affichage des colonnes
  const arrange=(list)=>{
    const q=search.trim().toLowerCase();
    let r = q ? list.filter(g=>g.name.toLowerCase().includes(q)) : list.slice();
    if(sortBy==="name") r.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortBy==="playtime") r.sort((a,b)=>b.minutes-a.minutes);
    else if(sortBy==="ach") r.sort((a,b)=>(b.achPct??-1)-(a.achPct??-1));
    return r;
  };

  const update=(id,patch)=>setGames(gs=>gs.map(g=>g.id===id?{...g,...patch}:g));

  const triageGame=unsorted[0]??null;
  const triageQuick=(status)=>triageGame&&update(triageGame.id,{status});
  const triageShortlist=()=>triageGame&&setPlatformPrompt({game:triageGame,target:STATUS.SHORTLIST});
  const triageMust=()=>triageGame&&setPlatformPrompt({game:triageGame,target:STATUS.MUSTFINISH});
  const confirmPlatform=(platform)=>{ if(!platformPrompt)return; update(platformPrompt.game.id,{status:platformPrompt.target,platform}); setPlatformPrompt(null); };

  const pickPool=[...shortlist,...mustfinish];
  const eligible=pickPool.filter(g=>pickFilter===PLATFORM.BOTH?true:canRunOn(g,pickFilter));
  const doPick=()=>{ if(!eligible.length)return; setPick(eligible[Math.floor(Math.random()*eligible.length)]); };
  const launch=(game,plat)=>{ const count=plat===PLATFORM.PC?playingPC.length:playingDeck.length; if(count>=MAX_SLOTS)return; update(game.id,{status:STATUS.PLAYING,runningOn:plat}); setPick(null); };
  const pcFull=playingPC.length>=MAX_SLOTS, deckFull=playingDeck.length>=MAX_SLOTS;

  const resetAll=()=>{ if(confirm("Recommencer le tri \u00e0 z\u00e9ro ? Tes choix actuels seront effac\u00e9s.")){ setGames(STEAM_LIBRARY.map(mkGame)); setView("triage"); setPick(null); } };
  const exportSave=()=>{ const blob=new Blob([JSON.stringify(games,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="mon-backlog-sauvegarde.json"; a.click(); };
  const importRef=useRef();
  const importSave=(e)=>{
    const f=e.target.files&&e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const arr=JSON.parse(r.result);
        if(!Array.isArray(arr)||!arr.length||!("status" in arr[0])) throw 0;
        setGames(arr); setPick(null); setPlatformPrompt(null);
        alert("Sauvegarde restaur\u00e9e \u2705 ("+arr.length+" jeux)");
      }catch(err){ alert("Fichier non valide. Choisis bien le .json export\u00e9 depuis cette app."); }
      e.target.value="";
    };
    r.readAsText(f);
  };
  const steamRef=useRef();
  const refreshFromSteam=(e)=>{
    const f=e.target.files&&e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      const fresh=parseSteamHTML(r.result);
      e.target.value="";
      if(!fresh){ alert("Je n'ai pas trouv\u00e9 tes jeux dans ce fichier. Refais Ctrl+S sur ta page de jeux Steam en choisissant \"Page Web, HTML seul\"."); return; }
      const map={}; fresh.forEach(g=>map[g.id]=g);
      let updated=0, added=0;
      setGames(prev=>{
        const next=prev.map(g=>{
          const f2=map[g.id];
          if(f2){ updated++; return {...g, minutes:f2.minutes, achUnlocked:(f2.achUnlocked!==undefined?f2.achUnlocked:g.achUnlocked), achTotal:(f2.achTotal!==undefined?f2.achTotal:g.achTotal), achPct:(f2.achPct!==undefined?f2.achPct:g.achPct)}; }
          return g;
        });
        const known=new Set(prev.map(g=>g.id));
        fresh.forEach(f2=>{ if(!known.has(f2.id)){ next.push(mkGame(f2)); added++; } });
        return next;
      });
      alert("Mis \u00e0 jour \u2705\\n"+updated+" jeux rafra\u00eechis"+(added?(", "+added+" nouveau(x) ajout\u00e9(s) au tri"):"")+".\\nTon classement est conserv\u00e9.");
    };
    r.readAsText(f);
  };

  return (
    <div style={S.root}>
      <header style={S.header}>
        <div style={S.brand}><Sparkles size={20} sw={2.5}/><span>BACKLOG BUSTER</span></div>
        <nav style={S.nav}>
          <button style={S.navBtn(view==="triage")} onClick={()=>setView("triage")}>Tri {unsorted.length>0 && <span style={S.badge}>{unsorted.length}</span>}</button>
          <button style={S.navBtn(view==="board")} onClick={()=>setView("board")}>Tableau</button>
          <button style={S.navGhost} onClick={exportSave} title="Sauvegarder une copie"><Download size={15}/></button>
          <button style={S.navGhost} onClick={()=>importRef.current.click()} title="Restaurer une sauvegarde"><Upload size={15}/></button>
          <input ref={importRef} type="file" accept=".json,application/json" hidden onChange={importSave}/>
          <button style={S.navRefresh} onClick={()=>steamRef.current.click()} title="Mettre \u00e0 jour les succ\u00e8s depuis un export Steam"><Flame size={15}/> MAJ succ\u00e8s</button>
          <input ref={steamRef} type="file" accept=".html,.htm,text/html" hidden onChange={refreshFromSteam}/>
        </nav>
      </header>

      {view==="triage" && (
        <main style={S.center}>
          {platformPrompt ? (
            <>
              <div style={S.triageMeta}>Sur quelle plateforme tu y jouerais ?</div>
              <div style={S.card}><div style={S.cardName}>{platformPrompt.game.name}</div></div>
              <div style={S.triageBtns}>
                <button style={{...S.tBtn,...S.tPC}} onClick={()=>confirmPlatform(PLATFORM.PC)}><Monitor size={18}/> PC</button>
                <button style={{...S.tBtn,...S.tBoth}} onClick={()=>confirmPlatform(PLATFORM.BOTH)}><Sparkles size={18}/> Les deux</button>
                <button style={{...S.tBtn,...S.tDeck}} onClick={()=>confirmPlatform(PLATFORM.DECK)}><Gamepad2 size={18}/> Deck</button>
              </div>
            </>
          ) : triageGame ? (
            <>
              <div style={S.triageMeta}>{unsorted.length} \u00e0 trier \u00b7 {shortlist.length+mustfinish.length} \u00e0 jouer</div>
              <div style={S.card} key={triageGame.id}>
                <div style={S.cardName}>{triageGame.name}</div>
                <div style={S.cardTime}><Clock size={14}/> {triageGame.minutes<30?"Jamais vraiment lanc\u00e9":fmtHours(triageGame.minutes)+" jou\u00e9"}</div>
                <div style={{...S.cardTime,marginTop:6,color:achColor(triageGame)}}><Trophy size={14}/> {achLabel(triageGame)??"Pas de succ\u00e8s"}</div>
              </div>
              <div style={S.triageBtns}>
                <button style={{...S.tBtn,...S.tNever}} onClick={()=>triageQuick(STATUS.NEVER)}><X size={18}/> Jamais</button>
                <button style={{...S.tBtn,...S.tSomeday}} onClick={()=>triageQuick(STATUS.SOMEDAY)}><Pause size={18}/> Un jour</button>
                <button style={{...S.tBtn,...S.tMust}} onClick={triageMust}><Flame size={18}/> Must Finish</button>
                <button style={{...S.tBtn,...S.tShort}} onClick={triageShortlist}><Check size={18}/> Shortlist</button>
              </div>
              <button style={S.tDone} onClick={()=>triageQuick(STATUS.DONE)}><Trophy size={15}/> D\u00e9j\u00e0 termin\u00e9</button>
              <p style={S.hint}>Tranche vite. Si t'h\u00e9sites, c'est "Un jour".</p>
            </>
          ) : (
            <div style={S.doneTriage}>
              <Trophy size={40}/>
              <h2 style={S.h2}>Tri termin\u00e9 \ud83c\udfaf</h2>
              <p style={S.lead}>{shortlist.length} jeux dans ta shortlist. C'est \u00e7a, ton vrai backlog.</p>
              <button style={S.bigBtn} onClick={()=>setView("board")}>Voir mon tableau</button>
            </div>
          )}
        </main>
      )}

      {view==="board" && (
        <main style={S.board}>
          <section style={S.stats}>
            <Stat icon={<Library size={16}/>} label="Biblioth\u00e8que" value={games.length}/>
            <Stat icon={<Trophy size={16}/>} label="Termin\u00e9s" value={done.length} accent="#7ee787"/>
            <Stat icon={<Flame size={16}/>} label="Shortlist" value={shortlist.length} accent="#ffa657"/>
            <Stat icon={<Trophy size={16}/>} label="100% succ\u00e8s" value={perfected.length} accent="#d2a8ff"/>
            <Stat icon={<Coins size={16}/>} label="Jamais lanc\u00e9s" value={untouched.length} accent="#f85149"/>
          </section>

          {untouched.length>5 && (
            <div style={S.warn}><Coins size={16}/> {untouched.length} jeux jamais vraiment lanc\u00e9s dorment dans ta biblioth\u00e8que. R\u00e8gle : finis-en 2 avant d'en acheter un nouveau.</div>
          )}

          <section style={S.activeRow}>
            <SlotBox icon={<Monitor size={16}/>} label="PC" color="#79c0ff" games={playingPC} onDone={(id)=>update(id,{status:STATUS.DONE})} onDrop={(id)=>update(id,{status:STATUS.DROPPED})}/>
            <SlotBox icon={<Gamepad2 size={16}/>} label="Steam Deck" color="#d2a8ff" games={playingDeck} onDone={(id)=>update(id,{status:STATUS.DONE})} onDrop={(id)=>update(id,{status:STATUS.DROPPED})}/>
          </section>

          <section style={S.pickBox}>
            <div style={S.pickFilters}>
              <span style={S.pickFilterLbl}>Pioche pour :</span>
              {[[PLATFORM.BOTH,"Tout"],[PLATFORM.PC,"PC"],[PLATFORM.DECK,"Deck"]].map(([v,l])=>(
                <button key={v} style={S.filterBtn(pickFilter===v)} onClick={()=>{setPickFilter(v);setPick(null);}}>{l}</button>
              ))}
            </div>
            {pick ? (
              <>
                <div style={S.pickName}>{pick.name}</div>
                <div style={S.pickBtns}>
                  {canRunOn(pick,PLATFORM.PC) && <button style={S.pickGo} disabled={pcFull} onClick={()=>launch(pick,PLATFORM.PC)}><Monitor size={15}/> Lancer PC</button>}
                  {canRunOn(pick,PLATFORM.DECK) && <button style={S.pickGoDeck} disabled={deckFull} onClick={()=>launch(pick,PLATFORM.DECK)}><Gamepad2 size={15}/> Lancer Deck</button>}
                  <button style={S.pickAgain} onClick={doPick}><Shuffle size={15}/> Repioche</button>
                </div>
              </>
            ) : (
              <>
                <p style={S.muted}>Tu sais pas quoi jouer ? Laisse le hasard d\u00e9cider.</p>
                <button style={S.bigBtn} onClick={doPick} disabled={!eligible.length}><Shuffle size={18}/> Pioche un jeu</button>
                {!eligible.length && <p style={S.hint}>Aucun jeu \u00e0 jouer pour ce filtre (ajoute-en \u00e0 Shortlist ou Must Finish).</p>}
              </>
            )}
          </section>

          {perfected.length>0 && (
            <section style={S.trophyWall}>
              <div style={S.trophyHead}><Trophy size={16}/> Mur des trophées \u00b7 {perfected.length} jeu{perfected.length>1?"x":""} \u00e0 100%</div>
              <div style={S.trophyGrid}>
                {perfected.map(g=>(
                  <div key={g.id} style={S.trophyChip}>
                    <Trophy size={13}/> <span style={S.trophyName}>{g.name}</span>
                  </div>
                ))}
              </div>
            </section>
          )}

          <div style={S.toolbar}>
            <input style={S.searchInput} placeholder="Rechercher un jeu\u2026" value={search} onChange={(e)=>setSearch(e.target.value)}/>
            {search && <button style={S.clearBtn} onClick={()=>setSearch("")}><X size={14}/></button>}
            <div style={S.sortGroup}>
              <span style={S.sortLbl}>Trier :</span>
              {[["name","A-Z"],["playtime","Temps"],["ach","% succ\u00e8s"]].map(([v,l])=>(
                <button key={v} style={S.sortBtn(sortBy===v)} onClick={()=>setSortBy(v)}>{l}</button>
              ))}
            </div>
          </div>

          <section style={S.columns}>
            <Column title="Shortlist" color="#ffa657" games={arrange(shortlist)} showPlatform render={(g)=>(
              <div style={S.colGameActions}>
                {canRunOn(g,PLATFORM.PC) && <button style={S.colBtn} disabled={pcFull} onClick={()=>launch(g,PLATFORM.PC)}>\u25b6 PC</button>}
                {canRunOn(g,PLATFORM.DECK) && <button style={S.colBtn} disabled={deckFull} onClick={()=>launch(g,PLATFORM.DECK)}>\u25b6 Deck</button>}
                <button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.MUSTFINISH})}>Must Finish</button>
                <button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.SOMEDAY})}>Un jour</button>
              </div>
            )}/>
            <Column title="Must Finish" color="#f778ba" games={arrange(mustfinish)} showPlatform render={(g)=>(
              <div style={S.colGameActions}>
                {canRunOn(g,PLATFORM.PC) && <button style={S.colBtn} disabled={pcFull} onClick={()=>launch(g,PLATFORM.PC)}>\u25b6 PC</button>}
                {canRunOn(g,PLATFORM.DECK) && <button style={S.colBtn} disabled={deckFull} onClick={()=>launch(g,PLATFORM.DECK)}>\u25b6 Deck</button>}
                <button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.SHORTLIST})}>\u2191 Shortlist</button>
                <button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.SOMEDAY})}>Un jour</button>
              </div>
            )}/>
            <Column title="Un jour" color="#79c0ff" games={arrange(someday)} render={(g)=>(
              <div style={S.colGameActions}>
                <button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.MUSTFINISH})}>\u2191 Must Finish</button>
                <button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.NEVER})}>Jamais</button>
              </div>
            )}/>
            <Column title="Jamais" color="#8b949e" games={arrange(by(STATUS.NEVER))} render={(g)=>(
              <div style={S.colGameActions}>
                <button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.SOMEDAY})}>\u2191 Un jour</button>
              </div>
            )}/>
          </section>

          <section style={{...S.columns,marginTop:14}}>
            <Column title="Termin\u00e9s" color="#7ee787" games={arrange(done)} render={()=>null}/>
            <Column title="Abandonn\u00e9s" color="#8b949e" games={arrange(dropped)} render={(g)=>(
              <div style={S.colGameActions}><button style={S.colBtn} onClick={()=>update(g.id,{status:STATUS.SHORTLIST})}>R\u00e9essayer</button></div>
            )}/>
          </section>

          <div style={{textAlign:"center",marginTop:28}}>
            <button style={S.resetBtn} onClick={resetAll}>Recommencer le tri \u00e0 z\u00e9ro</button>
          </div>
        </main>
      )}
    </div>
  );
}

function Stat({icon,label,value,accent="#e6edf3"}){
  return <div style={S.statBox}><div style={{...S.statIcon,color:accent}}>{icon}</div><div style={{...S.statValue,color:accent}}>{value}</div><div style={S.statLabel}>{label}</div></div>;
}
function SlotBox({icon,label,color,games,onDone,onDrop}){
  return (
    <div style={S.slotBox}>
      <div style={{...S.slotHead,color}}>{icon} {label} ({games.length}/{MAX_SLOTS})</div>
      {games.length===0 && <p style={S.muted}>Aucun jeu actif.</p>}
      {games.map(g=>(
        <div key={g.id} style={S.activeGame}>
          <span>{g.name}</span>
          <div style={S.activeActions}>
            <button style={S.miniDone} onClick={()=>onDone(g.id)}><Check size={14}/> Fini</button>
            <button style={S.miniDrop} onClick={()=>onDrop(g.id)}><X size={14}/> Abandon</button>
          </div>
        </div>
      ))}
    </div>
  );
}
const PLAT_TAG={pc:["PC","#79c0ff"],deck:["Deck","#d2a8ff"],both:["PC+Deck","#7ee787"]};
function Column({title,color,games,render,showPlatform}){
  return (
    <div style={S.col}>
      <div style={{...S.colHead,color}}>{title} <span style={S.colCount}>{games.length}</span></div>
      <div style={S.colBody}>
        {games.length===0 && <p style={S.colEmpty}>\u2014</p>}
        {games.map(g=>(
          <div key={g.id} style={S.colGame}>
            <div style={S.colGameTop}>
              <span style={S.colGameName}>{g.name}</span>
              {showPlatform && g.platform && <span style={{...S.platTag,color:PLAT_TAG[g.platform][1],borderColor:PLAT_TAG[g.platform][1]+"55"}}>{PLAT_TAG[g.platform][0]}</span>}
            </div>
            {g.achTotal>0 && (
              <div style={S.achRow}>
                <div style={S.achBar}><div style={{...S.achFill,width:g.achPct+"%",background:achColor(g)}}/></div>
                <span style={{...S.achTxt,color:achColor(g)}}>{achLabel(g)}</span>
              </div>
            )}
            {render(g)}
          </div>
        ))}
      </div>
    </div>
  );
}

  sortLbl:{color:"#8b949e",fontSize:13,fontFamily:DISPLAY},

  colHead:{display:"flex",justifyContent:"space-between",padding:"12px 14px",fontWeight:700,fontSize:14,borderBottom:"1px solid #21262d",fontFamily:DISPLAY},

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
